    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/bg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .glow-border {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { transform: scale(1.05); opacity: 0.8; box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .music-player-glow {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        /* RGB Glow Animation */


        .rgb-glow {
            animation: rgb-glow 5s linear infinite;
        }

        /* Ensure icons are visible */
        svg {
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col sm:flex-row items-center justify-center p-4 sm:p-6 bg-black selection:bg-white/20">
    <div class="bg-image"></div>
    
    <div class="fixed top-4 right-4 sm:top-6 sm:right-6 z-50">

            </div>
            <button id="music-toggle" aria-label="Toggle Music" class="w-8 h-8 sm:w-10 sm:h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all active:scale-90 relative">
                <div id="pulse-ring" class="absolute inset-0 rounded-full border border-white/40 opacity-0" aria-hidden="true"></div>
                <i data-lucide="play" id="play-icon" class="w-4 h-4 sm:w-5 sm:h-5" aria-hidden="true"></i>
                <i data-lucide="pause" id="pause-icon" class="w-4 h-4 sm:w-5 sm:h-5 hidden" aria-hidden="true"></i>

        </div>
        <audio id="bg-audio" loop preload="none">

    </div>

    <div class="w-full max-w-lg flex flex-col gap-6">

    <!-- Profile Section -->

        <div class="relative mb-4">

</div>

    <script>
        // Initialize Lucide Icons with specific settings
        function initIcons() {
            if (window.lucide) {
                lucide.createIcons();
            }
        }
        initIcons();

        // Initialize AOS
        AOS.init({
            once: true,
            duration: 800,
            easing: 'ease-out-cubic'
        });

        // Music Player Logic
        const audio = document.getElementById('bg-audio');
        const toggleBtn = document.getElementById('music-toggle');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const pulseRing = document.getElementById('pulse-ring');

        toggleBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                pulseRing.classList.add('pulse-animation');
            } else {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                pulseRing.classList.remove('pulse-animation');
            }
        });

        // Set volume to be subtle
        audio.volume = 0.3;
    </script>
</body>
